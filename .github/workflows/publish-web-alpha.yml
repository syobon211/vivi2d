name: Publish Web SDK Alpha

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Expected @vivi2d/web version"
        required: true
      ref:
        description: "Release tag to publish, for example web-v0.1.0-alpha.0"
        required: true
      dryRun:
        description: "Run all gates and pack, but skip npm publish"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: publish-web-alpha
  cancel-in-progress: false

jobs:
  validate-and-pack-web-alpha:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      VERSION: ${{ inputs.version }}
      RELEASE_REF: ${{ inputs.ref }}
    outputs:
      tarball-name: ${{ steps.pack.outputs.filename }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
      - name: Verify release tag before repository scripts run
        shell: bash
        run: |
          set -euo pipefail
          case "$VERSION" in
            *[!0-9A-Za-z.-]*|'') echo "Invalid version input" >&2; exit 1 ;;
          esac
          test "$RELEASE_REF" = "web-v$VERSION"
          test "$GITHUB_REF" = "refs/tags/$RELEASE_REF"
          git rev-parse -q --verify "refs/tags/$RELEASE_REF^{tag}" >/dev/null
          test "$(git rev-list -n 1 "$RELEASE_REF")" = "$(git rev-parse HEAD)"
      - run: npm install -g npm@11.5.1 --ignore-scripts
      - run: npm ci
      - run: node scripts/check-npm-cli-version.mjs --min-node 22.14.0 --min-npm 11.5.1
      - run: node scripts/check-release-input-version.mjs --workspace @vivi2d/web --version "$VERSION" --dist-tag alpha
      - run: node scripts/check-release-tag.mjs --tag "web-v$VERSION" --ref "$RELEASE_REF" --sha "$(git rev-parse HEAD)"
      - run: node scripts/run-release-step.mjs --name test-fuzz-parsers -- npm run test:fuzz:parsers
      - run: node scripts/run-release-step.mjs --name check-quality -- npm run check:quality
      - run: node scripts/run-release-step.mjs --name check-quality-e2e-workflow-record -- npm run check:quality:e2e-workflow-record
      - run: node scripts/run-release-step.mjs --name check-sdk-unlock-web -- npm run check:sdk-unlock:web
      - run: node scripts/run-release-step.mjs --name check-oss-readiness -- npm run check:oss-readiness
      - run: node scripts/run-release-step.mjs --name check-oss-publication -- npm run check:oss-publication
      - run: node scripts/run-release-step.mjs --name check-release-surface -- npm run check:release-surface
      - run: node scripts/run-release-step.mjs --name check-pack-contents -- npm run check:pack-contents
      - run: node scripts/run-release-step.mjs --name check-sdk-external-consumer -- npm run check:sdk-external-consumer
      - run: node scripts/run-release-step.mjs --name notices-check -- npm run notices:check
      - run: node scripts/run-release-step.mjs --name check-sbom -- npm run check:sbom
      - run: node scripts/run-release-step.mjs --name audit-all -- npm run audit:all
      - run: node scripts/run-release-step.mjs --name audit-prod -- npm run audit:prod
      - run: node scripts/install-pinned-gitleaks.mjs --manifest scripts/release-tool-versions.json
      - run: node scripts/run-release-step.mjs --name check-history-secrets -- npm run check:history-secrets
      - run: node scripts/run-release-step.mjs --name gitleaks-worktree -- gitleaks detect --source . --no-git
      - run: node scripts/run-release-step.mjs --name gitleaks-history -- gitleaks git --log-opts="--all" .
      - run: node scripts/run-release-step.mjs --name sbom-generate -- npm run sbom:generate
      - id: pack
        run: |
          npm pack --workspace @vivi2d/web --json > web-pack-result.json
          node scripts/write-pack-output.mjs --pack-result web-pack-result.json >> "$GITHUB_OUTPUT"
      - run: node scripts/record-web-npm-alpha-artifacts.mjs --pack-result web-pack-result.json --gate-transcript transcripts --workspace @vivi2d/web --output web-npm-alpha-release-record.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-npm-alpha-release-record
          retention-days: 14
          path: |
            web-pack-result.json
            web-npm-alpha-release-record.json
            *.tgz
            transcripts/
            dist/sbom/

  publish-web-alpha:
    if: ${{ !inputs.dryRun }}
    needs: validate-and-pack-web-alpha
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm-alpha
    permissions:
      contents: read
      id-token: write
    env:
      VERSION: ${{ inputs.version }}
      RELEASE_REF: ${{ inputs.ref }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: Verify release tag before publication
        shell: bash
        run: |
          set -euo pipefail
          case "$VERSION" in
            *[!0-9A-Za-z.-]*|'') echo "Invalid version input" >&2; exit 1 ;;
          esac
          test "$RELEASE_REF" = "web-v$VERSION"
          test "$GITHUB_REF" = "refs/tags/$RELEASE_REF"
          git rev-parse -q --verify "refs/tags/$RELEASE_REF^{tag}" >/dev/null
          test "$(git rev-list -n 1 "$RELEASE_REF")" = "$(git rev-parse HEAD)"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@11.5.1 --ignore-scripts
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: web-npm-alpha-release-record
      - run: node scripts/check-npm-cli-version.mjs --min-node 22.14.0 --min-npm 11.5.1
      - run: node scripts/verify-web-npm-alpha-release-record.mjs --pack-result web-pack-result.json --tarball "${{ needs.validate-and-pack-web-alpha.outputs.tarball-name }}" --version "$VERSION"
      - run: npm publish "$PACKED_TARBALL" --access public --tag alpha --provenance
        env:
          PACKED_TARBALL: ${{ needs.validate-and-pack-web-alpha.outputs.tarball-name }}
      - run: node scripts/verify-web-npm-alpha-publish.mjs --package @vivi2d/web --version "$VERSION" --pack-result web-pack-result.json --run-id "$GITHUB_RUN_ID"
