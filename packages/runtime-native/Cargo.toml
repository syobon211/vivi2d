[workspace]
members = [
  "crates/vivi-runtime-native-core",
  "crates/vivi-runtime-native-c-abi",
  "crates/vivi-runtime-native-wasm",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.89"
license = "Apache-2.0"
repository = "https://github.com/syobon211/vivi2d"

[profile.dev]
panic = "unwind"

[profile.release]
panic = "unwind"
